version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: anime_gravity_db
    restart: always
    environment:
      POSTGRES_USER: gravity_user
      POSTGRES_PASSWORD: gravity_password
      POSTGRES_DB: anime_gravity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
